<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login - FMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="d-flex align-items-center min-vh-100 bg-light">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="text-center mb-3">
                        <i class="fas fa-truck-pickup text-primary"></i>
                    </h3>
                    <h4 class="text-center mb-4">Fleet Maintenance System</h4>

                    <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
                    <div th:if="${param.logout}" class="alert alert-info">You have been logged out.</div>

                    <form th:action="@{/auth/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" autofocus required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt me-1"></i> Sign In
                        </button>
                    </form>

                    <div class="text-muted small mt-4 text-center">
                        Default users: <code>admin</code> / <code>manager</code> / <code>finance</code> /
                        <code>mechanic1</code><br/>Password: <code>password123</code>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
