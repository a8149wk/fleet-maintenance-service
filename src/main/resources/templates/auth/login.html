<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Sign in - FleetOps</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="auth-shell d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <span class="auth-brand mb-3">
                        <i class="fas fa-truck-pickup"></i>
                    </span>
                    <h4 class="mb-1" style="font-size:1.25rem;">Welcome back</h4>
                    <div class="text-muted text-tiny">Sign in to your FleetOps account</div>
                </div>

                <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
                <div th:if="${param.logout}" class="alert alert-info">You have been signed out.</div>

                <form th:action="@{/auth/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" autofocus required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required/>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign in</button>
                </form>

                <div class="divider"></div>
                <div class="text-muted text-tiny text-center">
                    Demo users: <code>admin</code> &middot; <code>manager</code> &middot; <code>finance</code> &middot;
                    <code>mechanic1</code><br/>
                    Password for all: <code>password123</code>
                </div>
            </div>
            <div class="text-center text-tiny text-muted mt-3">
                &copy; 2026 FleetOps &middot; Fleet Maintenance System
            </div>
        </div>
    </div>
</div>
</body>
</html>
