<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title th:text="${mechanic.fullName}">Mechanic</title></head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><span th:text="${mechanic.fullName}"></span></h2>
        <div>
            <a th:href="@{/mechanics/{id}/edit(id=${mechanic.id})}" class="btn btn-outline-primary"><i class="fas fa-edit"></i> Edit</a>
            <a th:href="@{/mechanics}" class="btn btn-light">Back</a>
        </div>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">Code</dt><dd class="col-sm-9" th:text="${mechanic.code}"></dd>
                <dt class="col-sm-3">Email</dt><dd class="col-sm-9" th:text="${mechanic.email}"></dd>
                <dt class="col-sm-3">Phone</dt><dd class="col-sm-9" th:text="${mechanic.phone}"></dd>
                <dt class="col-sm-3">Specialization</dt><dd class="col-sm-9" th:text="${mechanic.specialization}"></dd>
                <dt class="col-sm-3">Workshop</dt><dd class="col-sm-9" th:text="${mechanic.workshop != null ? mechanic.workshop.name : '-'}"></dd>
                <dt class="col-sm-3">Experience</dt><dd class="col-sm-9" th:text="${mechanic.experienceYears + ' years'}"></dd>
                <dt class="col-sm-3">Rating</dt><dd class="col-sm-9">
                    <i class="fas fa-star text-warning"></i> <span th:text="${mechanic.rating}"></span></dd>
                <dt class="col-sm-3">Jobs Completed</dt><dd class="col-sm-9" th:text="${mechanic.totalJobs}"></dd>
                <dt class="col-sm-3">Certifications</dt><dd class="col-sm-9" th:text="${mechanic.certification}"></dd>
            </dl>
        </div>
    </div>
</section>
</body>
</html>
