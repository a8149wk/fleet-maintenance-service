<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Mechanic Form</title></head>
<body>
<section layout:fragment="content">
    <h2 class="mb-3">
        <span th:text="${mechanic.id == null} ? 'New Mechanic' : 'Edit Mechanic'"></span></h2>
    <form th:action="${mechanic.id == null} ? @{/mechanics} : @{/mechanics/{id}(id=${mechanic.id})}"
          th:object="${mechanic}" method="post" class="card card-body shadow-sm">
        <div class="row g-3">
            <div class="col-md-3"><label class="form-label">Code</label><input th:field="*{code}" class="form-control"/></div>
            <div class="col-md-6"><label class="form-label">Full Name *</label><input th:field="*{fullName}" class="form-control" required/></div>
            <div class="col-md-3"><label class="form-label">Experience (years)</label><input type="number" th:field="*{experienceYears}" class="form-control"/></div>
            <div class="col-md-4"><label class="form-label">Email</label><input type="email" th:field="*{email}" class="form-control"/></div>
            <div class="col-md-4"><label class="form-label">Phone *</label><input th:field="*{phone}" class="form-control" required/></div>
            <div class="col-md-4"><label class="form-label">Workshop</label>
                <select th:field="*{workshop}" class="form-select">
                    <option value="">-- Select --</option>
                    <option th:each="w : ${workshops}" th:value="${w.id}" th:text="${w.name}"></option>
                </select>
            </div>
            <div class="col-md-6"><label class="form-label">Specialization</label><input th:field="*{specialization}" class="form-control"/></div>
            <div class="col-md-3"><label class="form-label">Rating</label><input type="number" step="0.1" min="0" max="5" th:field="*{rating}" class="form-control"/></div>
            <div class="col-md-3"><label class="form-label">Total Jobs</label><input type="number" th:field="*{totalJobs}" class="form-control"/></div>
            <div class="col-12"><label class="form-label">Certification</label><textarea th:field="*{certification}" class="form-control" rows="2"></textarea></div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary"><i class="fas fa-save me-1"></i> Save</button>
            <a th:href="@{/mechanics}" class="btn btn-light">Cancel</a>
        </div>
    </form>
</section>
</body>
</html>
