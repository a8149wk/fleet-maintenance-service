<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title th:text="${portalTitle}">Portal</title>
</head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0" th:text="${portalTitle}">Portal</h2>
    </div>
    <p class="text-muted">Work order yang di-assign ke akun Anda.</p>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>WO#</th>
                    <th>Vehicle</th>
                    <th>Client</th>
                    <th>Service</th>
                    <th>Status</th>
                    <th class="text-end">Estimated</th>
                    <th>Date</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${workOrders.isEmpty()}">
                    <td colspan="8" class="text-center text-muted py-4">Belum ada work order</td>
                </tr>
                <tr th:each="wo : ${workOrders.content}">
                    <td>
                        <a th:href="@{/__${portalPrefix}__/workorders/{id}(id=${wo.id})}"
                           th:text="${wo.workOrderNumber}"></a>
                        <span th:if="${wo.isUrgent}" class="badge bg-danger ms-1">URGENT</span>
                    </td>
                    <td th:text="${wo.vehicle.licensePlate}"></td>
                    <td th:text="${wo.client.name}"></td>
                    <td th:text="${wo.serviceType}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${wo.status.name() == 'COMPLETED' ? 'bg-success' :
                                                  wo.status.name() == 'IN_PROGRESS' ? 'bg-info' :
                                                  wo.status.name() == 'APPROVED' ? 'bg-primary' :
                                                  wo.status.name() == 'REJECTED' ? 'bg-danger' :
                                                  wo.status.name() == 'CANCELLED' ? 'bg-secondary' :
                                                  wo.status.name() == 'BILLED' ? 'bg-dark' : 'bg-warning'}"
                              th:text="${wo.status}"></span>
                    </td>
                    <td class="text-end"
                        th:text="${wo.estimatedCost != null ? 'Rp ' + #numbers.formatDecimal(wo.estimatedCost, 0, 'POINT', 0, 'POINT') : '-'}"></td>
                    <td th:text="${#temporals.format(wo.requestedDate, 'dd MMM yyyy')}"></td>
                    <td>
                        <a th:href="@{/__${portalPrefix}__/workorders/{id}(id=${wo.id})}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-eye"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <nav th:if="${workOrders.totalPages > 1}" class="card-footer">
            <ul class="pagination mb-0 justify-content-center">
                <li class="page-item" th:classappend="${workOrders.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/__${portalPrefix}__/workorders(page=${workOrders.number - 1})}">Previous</a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, workOrders.totalPages - 1)}"
                    th:classappend="${i == workOrders.number} ? 'active'">
                    <a class="page-link"
                       th:href="@{/__${portalPrefix}__/workorders(page=${i})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${workOrders.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/__${portalPrefix}__/workorders(page=${workOrders.number + 1})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</section>
</body>
</html>
