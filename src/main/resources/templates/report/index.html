<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Reports</title>
</head>
<body>
<section layout:fragment="content">
    <div class="page-head">
        <h2>Reports</h2>
        <div class="text-tiny text-muted">Operational and financial summaries</div>
    </div>

    <div class="row g-3">
        <div class="col-md-4">
            <a th:href="@{/reports/workorders}" class="card shadow-sm text-decoration-none h-100">
                <div class="card-body d-flex align-items-start gap-3">
                    <span class="stat-icon" style="background: var(--fms-tint-blue); color: var(--fms-icon-blue);">
                        <i class="fas fa-clipboard-list"></i>
                    </span>
                    <div>
                        <div class="fw-semibold text-body">Work Order Report</div>
                        <div class="text-tiny text-muted">Filter by date range, with PDF and Excel export.</div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/reports/inventory}" class="card shadow-sm text-decoration-none h-100">
                <div class="card-body d-flex align-items-start gap-3">
                    <span class="stat-icon" style="background: var(--fms-tint-amber); color: var(--fms-icon-amber);">
                        <i class="fas fa-boxes-stacked"></i>
                    </span>
                    <div>
                        <div class="fw-semibold text-body">Inventory Report</div>
                        <div class="text-tiny text-muted">Items currently at or below reorder point.</div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/reports/financial}" class="card shadow-sm text-decoration-none h-100">
                <div class="card-body d-flex align-items-start gap-3">
                    <span class="stat-icon" style="background: var(--fms-tint-green); color: var(--fms-icon-green);">
                        <i class="fas fa-file-invoice-dollar"></i>
                    </span>
                    <div>
                        <div class="fw-semibold text-body">Financial Report</div>
                        <div class="text-tiny text-muted">Revenue by date range and invoice ledger.</div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</section>
</body>
</html>
