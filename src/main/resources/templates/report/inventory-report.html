<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Inventory Report</title>
</head>
<body>
<section layout:fragment="content">
    <div class="page-head d-flex justify-content-between align-items-end flex-wrap gap-2">
        <div>
            <h2>Inventory Report</h2>
            <div class="text-tiny text-muted">Stock items currently at or below reorder point.</div>
        </div>
        <a th:href="@{/reports}" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body py-3 d-flex justify-content-between align-items-center">
            <div class="text-muted text-tiny">
                Items needing reorder: <span class="fw-semibold text-body" th:text="${#lists.size(alerts)}">0</span>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Part #</th>
                    <th>Name</th>
                    <th>Location</th>
                    <th class="text-end">Current</th>
                    <th class="text-end">Reserved</th>
                    <th class="text-end">Available</th>
                    <th class="text-end">Reorder Point</th>
                    <th class="text-end">Min Stock</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(alerts)}">
                    <td colspan="8" class="text-center text-muted py-4">All stock levels are healthy.</td>
                </tr>
                <tr th:each="a : ${alerts}">
                    <td th:text="${a.partNumber}"></td>
                    <td th:text="${a.partName}"></td>
                    <td th:text="${a.locationName}"></td>
                    <td class="text-end" th:text="${a.currentQuantity}"></td>
                    <td class="text-end" th:text="${a.reservedQuantity}"></td>
                    <td class="text-end fw-semibold" th:text="${a.availableQuantity}"></td>
                    <td class="text-end" th:text="${a.reorderPoint}"></td>
                    <td class="text-end" th:text="${a.minStockLevel}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
