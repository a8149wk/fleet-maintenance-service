<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Work Order Report</title>
</head>
<body>
<section layout:fragment="content">
    <div class="page-head d-flex justify-content-between align-items-end flex-wrap gap-2">
        <div>
            <h2>Work Order Report</h2>
            <div class="text-tiny text-muted">Filter work orders by date range, with PDF and Excel export.</div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/reports/workorders/export/pdf}" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-file-pdf"></i> PDF
            </a>
            <a th:href="@{/reports/workorders/export/excel}" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-file-excel"></i> Excel
            </a>
            <a th:href="@{/reports}" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
    </div>

    <form th:action="@{/reports/workorders}" method="get" class="card card-body mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-md-4">
                <label class="form-label">Start date</label>
                <input type="date" name="startDate" class="form-control"
                       th:value="${startDate}"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">End date</label>
                <input type="date" name="endDate" class="form-control"
                       th:value="${endDate}"/>
            </div>
            <div class="col-md-4">
                <button class="btn btn-primary w-100" type="submit">
                    <i class="fas fa-filter"></i> Apply
                </button>
            </div>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="card-body py-3 d-flex justify-content-between align-items-center">
            <div class="text-muted text-tiny">
                Records: <span class="fw-semibold text-body" th:text="${#lists.size(workOrders)}">0</span>
                <span class="mx-2">|</span>
                Range:
                <span class="fw-semibold text-body"
                      th:text="${#temporals.format(startDate,'dd MMM yyyy')} + ' &mdash; ' + ${#temporals.format(endDate,'dd MMM yyyy')}"></span>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>WO#</th>
                    <th>Vehicle</th>
                    <th>Client</th>
                    <th>Service</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th class="text-end">Amount</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(workOrders)}">
                    <td colspan="7" class="text-center text-muted py-4">No work orders in this range.</td>
                </tr>
                <tr th:each="wo : ${workOrders}">
                    <td>
                        <a th:href="@{/workorders/{id}(id=${wo.id})}" th:text="${wo.workOrderNumber}"></a>
                    </td>
                    <td th:text="${wo.vehicle != null ? wo.vehicle.licensePlate : '-'}"></td>
                    <td th:text="${wo.client != null ? wo.client.name : '-'}"></td>
                    <td th:text="${wo.serviceType}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${wo.status.name() == 'COMPLETED' ? 'bg-success' :
                                                  wo.status.name() == 'IN_PROGRESS' ? 'bg-info' :
                                                  wo.status.name() == 'APPROVED' ? 'bg-primary' :
                                                  wo.status.name() == 'REJECTED' ? 'bg-danger' :
                                                  wo.status.name() == 'CANCELLED' ? 'bg-secondary' :
                                                  wo.status.name() == 'BILLED' ? 'bg-dark' : 'bg-warning'}"
                              th:text="${wo.status}"></span>
                    </td>
                    <td th:text="${#temporals.format(wo.requestedDate,'dd MMM yyyy')}"></td>
                    <td class="text-end"
                        th:with="amt=${wo.totalAmount != null ? wo.totalAmount : wo.estimatedCost}"
                        th:text="${amt != null ? 'Rp ' + #numbers.formatDecimal(amt, 0, 'POINT', 0, 'POINT') : '-'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
