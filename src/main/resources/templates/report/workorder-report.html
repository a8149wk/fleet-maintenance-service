<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Work Order Report</title></head>
<body>
<section layout:fragment="content">
    <h2 class="mb-3"><i class="fas fa-tasks text-primary"></i> Work Order Report</h2>
    <form th:action="@{/reports/workorders}" method="get" class="card card-body mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-md-4">
                <label class="form-label">Start Date</label>
                <input type="date" name="startDate" th:value="${startDate}" class="form-control"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">End Date</label>
                <input type="date" name="endDate" th:value="${endDate}" class="form-control"/>
            </div>
            <div class="col-md-4"><button class="btn btn-primary w-100">Generate</button></div>
        </div>
    </form>
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table mb-0">
                <thead class="table-light">
                <tr>
                    <th>WO#</th><th>Vehicle</th><th>Client</th>
                    <th>Status</th><th>Date</th>
                    <th class="text-end">Amount</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(workOrders)}">
                    <td colspan="6" class="text-center text-muted py-4">No data</td>
                </tr>
                <tr th:each="w : ${workOrders}">
                    <td><a th:href="@{/workorders/{id}(id=${w.id})}" th:text="${w.workOrderNumber}"></a></td>
                    <td th:text="${w.vehicle.licensePlate}"></td>
                    <td th:text="${w.client.name}"></td>
                    <td><span class="badge bg-secondary" th:text="${w.status}"></span></td>
                    <td th:text="${#temporals.format(w.requestedDate, 'dd MMM yyyy')}"></td>
                    <td class="text-end"
                        th:text="${w.totalAmount != null ? 'Rp ' + #numbers.formatDecimal(w.totalAmount, 0, 'POINT', 0, 'POINT') : '-'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
