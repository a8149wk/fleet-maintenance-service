<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title th:text="${workshop.name}">Workshop</title></head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><span th:text="${workshop.name}"></span>
            <span class="badge bg-info ms-2" th:text="${workshop.type}"></span></h2>
        <div>
            <a th:href="@{/workshops/{id}/edit(id=${workshop.id})}" class="btn btn-outline-primary"><i class="fas fa-edit"></i> Edit</a>
            <a th:href="@{/workshops}" class="btn btn-light">Back</a>
        </div>
    </div>
    <div class="row g-3">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-4">Code</dt><dd class="col-sm-8" th:text="${workshop.code}"></dd>
                        <dt class="col-sm-4">Address</dt>
                        <dd class="col-sm-8" th:text="${workshop.address + ', ' + workshop.city}"></dd>
                        <dt class="col-sm-4">Phone</dt><dd class="col-sm-8" th:text="${workshop.phone}"></dd>
                        <dt class="col-sm-4">Email</dt><dd class="col-sm-8" th:text="${workshop.email}"></dd>
                        <dt class="col-sm-4">Hours</dt><dd class="col-sm-8" th:text="${workshop.operatingHours}"></dd>
                        <dt class="col-sm-4">Capacity</dt><dd class="col-sm-8" th:text="${workshop.serviceCapacity}"></dd>
                        <dt class="col-sm-4">Specialization</dt><dd class="col-sm-8" th:text="${workshop.specialization}"></dd>
                        <dt class="col-sm-4">Rating</dt><dd class="col-sm-8">
                            <i class="fas fa-star text-warning"></i> <span th:text="${workshop.rating}"></span>
                            <span class="text-muted" th:text="'(' + ${workshop.totalReviews} + ' reviews)'"></span>
                        </dd>
                    </dl>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white"><h6 class="mb-0">Mechanics</h6></div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                        <tr><th>Code</th><th>Name</th><th>Specialization</th><th>Experience</th></tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(mechanics)}">
                            <td colspan="4" class="text-muted text-center">No mechanics assigned</td>
                        </tr>
                        <tr th:each="m : ${mechanics}">
                            <td th:text="${m.code}"></td>
                            <td><a th:href="@{/mechanics/{id}(id=${m.id})}" th:text="${m.fullName}"></a></td>
                            <td th:text="${m.specialization}"></td>
                            <td th:text="${m.experienceYears + ' years'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
