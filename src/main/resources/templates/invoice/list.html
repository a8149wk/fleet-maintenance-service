<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Invoices</title></head>
<body>
<section layout:fragment="content">
    <h2 class="mb-3">Invoices</h2>
    <form th:action="@{/invoices}" method="get" class="card card-body mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="">All</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                            th:selected="${s.name() == param.status}"></option>
                </select>
            </div>
            <div class="col-md-7">
                <label class="form-label">Search</label>
                <input type="text" name="search" class="form-control" th:value="${param.search}"
                       placeholder="Invoice number or client"/>
            </div>
            <div class="col-md-2"><button class="btn btn-primary w-100">Filter</button></div>
        </div>
    </form>
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Invoice #</th>
                    <th>Client</th>
                    <th>Invoice Date</th>
                    <th>Due Date</th>
                    <th class="text-end">Total</th>
                    <th class="text-end">Paid</th>
                    <th class="text-end">Balance</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${invoices.empty}">
                    <td colspan="8" class="text-center text-muted py-4">No invoices</td>
                </tr>
                <tr th:each="i : ${invoices.content}">
                    <td><a th:href="@{/invoices/{id}(id=${i.id})}" th:text="${i.invoiceNumber}"></a></td>
                    <td th:text="${i.client.name}"></td>
                    <td th:text="${#temporals.format(i.invoiceDate, 'dd MMM yyyy')}"></td>
                    <td th:text="${#temporals.format(i.dueDate, 'dd MMM yyyy')}"></td>
                    <td class="text-end"
                        th:text="${'Rp ' + #numbers.formatDecimal(i.totalAmount, 0, 'POINT', 0, 'POINT')}"></td>
                    <td class="text-end"
                        th:text="${'Rp ' + #numbers.formatDecimal(i.paidAmount, 0, 'POINT', 0, 'POINT')}"></td>
                    <td class="text-end fw-bold"
                        th:text="${i.balance != null ? 'Rp ' + #numbers.formatDecimal(i.balance, 0, 'POINT', 0, 'POINT') : '-'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${i.status.name() == 'PAID' ? 'bg-success' :
                                                  i.status.name() == 'SENT' ? 'bg-info' :
                                                  i.status.name() == 'OVERDUE' ? 'bg-danger' :
                                                  i.status.name() == 'PARTIAL_PAID' ? 'bg-warning' :
                                                  i.status.name() == 'CANCELLED' ? 'bg-secondary' : 'bg-light text-dark'}"
                              th:text="${i.status}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
