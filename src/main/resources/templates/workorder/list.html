<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Work Orders</title>
</head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Work Orders</h2>
        <a th:href="@{/workorders/create}" class="btn btn-primary">
            <i class="fas fa-plus"></i> New Work Order
        </a>
    </div>

    <form th:action="@{/workorders}" method="get" class="card card-body mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="">All</option>
                    <option th:each="s : ${statuses}"
                            th:value="${s}"
                            th:text="${s}"
                            th:selected="${s.name() == param.status}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Search</label>
                <input type="text" name="search" class="form-control" th:value="${param.search}"
                       placeholder="WO Number, license plate, client..."/>
            </div>
            <div class="col-md-3">
                <button class="btn btn-primary w-100" type="submit"><i class="fas fa-search"></i> Filter</button>
            </div>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>WO#</th>
                    <th>Vehicle</th>
                    <th>Client</th>
                    <th>Service</th>
                    <th>Status</th>
                    <th class="text-end">Estimated</th>
                    <th>Date</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${workOrders.empty}">
                    <td colspan="8" class="text-center text-muted py-4">No work orders found</td>
                </tr>
                <tr th:each="wo : ${workOrders.content}">
                    <td>
                        <a th:href="@{/workorders/{id}(id=${wo.id})}" th:text="${wo.workOrderNumber}"></a>
                        <span th:if="${wo.isUrgent}" class="badge bg-danger ms-1">URGENT</span>
                    </td>
                    <td th:text="${wo.vehicle.licensePlate}"></td>
                    <td th:text="${wo.client.name}"></td>
                    <td th:text="${wo.serviceType}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${wo.status.name() == 'COMPLETED' ? 'bg-success' :
                                                  wo.status.name() == 'IN_PROGRESS' ? 'bg-info' :
                                                  wo.status.name() == 'APPROVED' ? 'bg-primary' :
                                                  wo.status.name() == 'REJECTED' ? 'bg-danger' :
                                                  wo.status.name() == 'CANCELLED' ? 'bg-secondary' :
                                                  wo.status.name() == 'BILLED' ? 'bg-dark' : 'bg-warning'}"
                              th:text="${wo.status}"></span>
                    </td>
                    <td class="text-end"
                        th:text="${wo.estimatedCost != null ? 'Rp ' + #numbers.formatDecimal(wo.estimatedCost, 0, 'POINT', 0, 'POINT') : '-'}"></td>
                    <td th:text="${#temporals.format(wo.requestedDate, 'dd MMM yyyy')}"></td>
                    <td>
                        <a th:href="@{/workorders/{id}(id=${wo.id})}" class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-eye"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <nav th:if="${workOrders.totalPages > 1}" class="card-footer">
            <ul class="pagination mb-0 justify-content-center">
                <li class="page-item" th:classappend="${workOrders.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/workorders(page=${workOrders.number - 1}, status=${param.status}, search=${param.search})}">Previous</a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, workOrders.totalPages - 1)}"
                    th:classappend="${i == workOrders.number} ? 'active'">
                    <a class="page-link"
                       th:href="@{/workorders(page=${i}, status=${param.status}, search=${param.search})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${workOrders.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/workorders(page=${workOrders.number + 1}, status=${param.status}, search=${param.search})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</section>
</body>
</html>
