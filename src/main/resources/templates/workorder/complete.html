<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Complete Work Order</title>
</head>
<body>
<section layout:fragment="content">
    <h2 class="mb-3"><i class="fas fa-check-double text-success"></i> Complete Work Order
        <span class="text-muted" th:text="${wo.workOrderNumber}"></span></h2>

    <form th:action="@{/workorders/{id}/complete(id=${wo.id})}" th:object="${completion}" method="post"
          class="card card-body shadow-sm">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Labor Cost</label>
                <input type="number" step="0.01" th:field="*{laborCost}" class="form-control"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Parts Cost</label>
                <input type="number" step="0.01" th:field="*{partsCost}" class="form-control"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Actual Cost (Total)</label>
                <input type="number" step="0.01" th:field="*{actualCost}" class="form-control" required/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Final Odometer</label>
                <input type="number" th:field="*{odometer}" class="form-control"/>
            </div>
            <div class="col-md-8">
                <label class="form-label">Notes</label>
                <input type="text" th:field="*{notes}" class="form-control"/>
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input type="checkbox" th:field="*{generateInvoice}" class="form-check-input" checked/>
                    <label class="form-check-label">Auto-generate invoice after completion</label>
                </div>
            </div>
        </div>

        <h6 class="mt-4">Used Items (consumes inventory)</h6>
        <table class="table table-sm align-middle" id="itemsTable">
            <thead class="table-light">
            <tr>
                <th>Type</th><th>Spare Part / Service</th><th>Qty</th>
                <th>Unit Price</th><th></th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button type="button" class="btn btn-sm btn-outline-secondary mb-3" onclick="addRow()">
            <i class="fas fa-plus"></i> Add Item
        </button>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success"><i class="fas fa-check me-1"></i> Complete</button>
            <a th:href="@{/workorders/{id}(id=${wo.id})}" class="btn btn-light">Cancel</a>
        </div>
    </form>

    <script th:inline="javascript">
        const spareParts = /*[[${spareParts}]]*/ [];
        let idx = 0;
        function addRow() {
            const tbody = document.querySelector('#itemsTable tbody');
            const tr = document.createElement('tr');
            const i = idx++;
            tr.innerHTML = `
                <td>
                    <select name="items[${i}].itemType" class="form-select form-select-sm">
                        <option value="PART">PART</option>
                        <option value="LABOR">LABOR</option>
                    </select>
                </td>
                <td>
                    <select name="items[${i}].sparePartId" class="form-select form-select-sm">
                        <option value="">-- select --</option>
                        ${spareParts.map(p => `<option value="${p.id}">${p.partNumber} - ${p.name}</option>`).join('')}
                    </select>
                    <input name="items[${i}].serviceName" class="form-control form-control-sm mt-1" placeholder="Service name"/>
                </td>
                <td><input type="number" name="items[${i}].quantity" class="form-control form-control-sm" value="1"/></td>
                <td><input type="number" step="0.01" name="items[${i}].unitPrice" class="form-control form-control-sm"/></td>
                <td><button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('tr').remove()"><i class="fas fa-trash"></i></button></td>
            `;
            tbody.appendChild(tr);
        }
        addRow();
    </script>
</section>
</body>
</html>
