<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title layout:title-pattern="$CONTENT_TITLE - FMS">Fleet Maintenance System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="fas fa-truck-pickup me-1"></i> FMS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="fas fa-home me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/workorders}"><i class="fas fa-tasks me-1"></i>Work Orders</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/vehicles}"><i class="fas fa-car me-1"></i>Vehicles</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/inventory}"><i class="fas fa-warehouse me-1"></i>Inventory</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/invoices}"><i class="fas fa-file-invoice-dollar me-1"></i>Invoices</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                    <a class="nav-link" th:href="@{/clients}"><i class="fas fa-building me-1"></i>Clients</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                    <a class="nav-link" th:href="@{/workshops}"><i class="fas fa-tools me-1"></i>Workshops</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                    <a class="nav-link" th:href="@{/mechanics}"><i class="fas fa-user-cog me-1"></i>Mechanics</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                    <a class="nav-link" th:href="@{/reports}"><i class="fas fa-chart-line me-1"></i>Reports</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle me-1"></i>
                        <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><span class="dropdown-item-text small"
                                  sec:authentication="authorities">Roles</span></li>
                        <li><hr class="dropdown-divider"/></li>
                        <li>
                            <form th:action="@{/auth/logout}" method="post">
                                <button type="submit" class="dropdown-item">
                                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container-fluid py-3">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <section layout:fragment="content">
        <!-- Page content goes here -->
    </section>
</main>

<footer class="text-center text-muted py-3 small border-top mt-4">
    &copy; 2026 Fleet Maintenance System &middot; CV Pandawa 76
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
