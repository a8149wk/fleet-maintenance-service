<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title layout:title-pattern="$CONTENT_TITLE - Fleet Maintenance">Fleet Maintenance Service</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo.png}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body th:with="path=${currentPath != null ? currentPath : ''}">

<!-- ============== Mobile drawer overlay ============== -->
<div class="sidebar-overlay" data-fms-sidebar-overlay></div>

<!-- ============== Left sidebar ============== -->
<aside class="fms-sidebar" data-fms-sidebar>
    <a class="sidebar-brand" th:href="@{/}">
        <img th:src="@{/img/logo.png}" alt="" class="brand-img"/>
        <span class="brand-text">
            <span class="brand-text-top">Fleet</span>
            <span class="brand-text-bot">Maintenance</span>
        </span>
    </a>

    <nav class="sidebar-nav">
        <th:block th:if="${sidebarMenus != null}"
                  th:each="section : ${sidebarMenus}">
            <div class="sidebar-section"
                 th:text="${section.key == 'main' ? 'Overview' :
                           section.key == 'operations' ? 'Operations' :
                           section.key == 'analytics' ? 'Analytics' :
                           section.key == 'administration' ? 'Administration' :
                           #strings.isEmpty(section.key) ? 'General' : section.key}">
                Section
            </div>
            <ul class="sidebar-items">
                <li th:each="item : ${section.value}">
                    <a th:href="${#strings.startsWith(item.path, '/') ? item.path : '/' + item.path}"
                       class="sidebar-link"
                       th:classappend="${(item.path == '/' and path == '/') or
                                          (item.path != '/' and #strings.startsWith(path, item.path)) ? 'active' : ''}">
                        <i th:class="${item.icon != null ? item.icon : 'fas fa-circle'}"></i>
                        <span th:text="${item.label}">Menu</span>
                    </a>
                </li>
            </ul>
        </th:block>
    </nav>

    <div class="sidebar-footer text-tiny">
        &copy; 2026 Fleet Maintenance Service
    </div>
</aside>

<!-- ============== Topbar + main content shell ============== -->
<div class="fms-shell">
    <header class="fms-topbar">
        <button type="button"
                class="btn btn-sm btn-outline-secondary d-lg-none"
                data-fms-sidebar-toggle
                aria-label="Toggle navigation">
            <i class="fas fa-bars"></i>
        </button>
        <div class="topbar-spacer"></div>
        <div class="dropdown">
            <a class="topbar-user dropdown-toggle" href="#" data-bs-toggle="dropdown">
                <span class="stat-icon tint-blue me-2" style="width:30px;height:30px;font-size:13px;">
                    <i class="fas fa-user"></i>
                </span>
                <span sec:authentication="name">User</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><span class="dropdown-item-text text-tiny text-muted"
                          sec:authentication="authorities">Roles</span></li>
                <li>
                    <hr class="dropdown-divider"/>
                </li>
                <li>
                    <form th:action="@{/auth/logout}" method="post">
                        <button type="submit" class="dropdown-item">
                            <i class="fas fa-arrow-right-from-bracket me-2 text-muted"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </header>

    <main class="fms-main">
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <section layout:fragment="content">
            <!-- Page content goes here -->
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
