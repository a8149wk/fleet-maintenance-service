<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Stock Movement</title></head>
<body>
<section layout:fragment="content">
    <h2 class="mb-3">Record Stock Movement</h2>
    <form th:action="@{/inventory/movement}" th:object="${movement}" method="post"
          class="card card-body shadow-sm">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Movement Type *</label>
                <select th:field="*{movementType}" class="form-select" required>
                    <option value="IN">IN (Restock)</option>
                    <option value="TRANSFER">TRANSFER</option>
                    <option value="ADJUSTMENT">ADJUSTMENT</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Spare Part *</label>
                <select th:field="*{sparePartId}" class="form-select" required>
                    <option value="">-- Select --</option>
                    <option th:each="p : ${spareParts}" th:value="${p.id}"
                            th:text="${p.partNumber + ' - ' + p.name}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Quantity *</label>
                <input type="number" th:field="*{quantity}" class="form-control" min="1" required/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Location (IN/ADJUSTMENT)</label>
                <select th:field="*{locationId}" class="form-select">
                    <option value="">-- Select --</option>
                    <option th:each="l : ${locations}" th:value="${l.id}" th:text="${l.name}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">From Location (TRANSFER)</label>
                <select th:field="*{fromLocationId}" class="form-select">
                    <option value="">-- Select --</option>
                    <option th:each="l : ${locations}" th:value="${l.id}" th:text="${l.name}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">To Location (TRANSFER)</label>
                <select th:field="*{toLocationId}" class="form-select">
                    <option value="">-- Select --</option>
                    <option th:each="l : ${locations}" th:value="${l.id}" th:text="${l.name}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Unit Cost (for IN)</label>
                <input type="number" step="0.01" th:field="*{unitCost}" class="form-control"/>
            </div>
            <div class="col-12">
                <label class="form-label">Notes</label>
                <textarea th:field="*{notes}" class="form-control" rows="2"></textarea>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary"><i class="fas fa-save me-1"></i> Save</button>
            <a th:href="@{/inventory}" class="btn btn-light">Cancel</a>
        </div>
    </form>
</section>
</body>
</html>
