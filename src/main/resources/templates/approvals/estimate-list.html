<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Estimate approvals</title>
</head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Persetujuan estimasi eksternal</h2>
        <a th:href="@{/}" class="btn btn-light"><i class="fas fa-home"></i></a>
    </div>
    <p class="text-muted">Work order berstatus ESTIMATED dengan estimasi dari bengkel rekanan atau supplier yang menunggu persetujuan.</p>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th>WO#</th>
                    <th>Vehicle</th>
                    <th>Client</th>
                    <th>Submitted by</th>
                    <th class="text-end">Estimated</th>
                    <th class="text-end" style="min-width: 220px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${workOrders.isEmpty()}">
                    <td colspan="6" class="text-center text-muted py-4">Tidak ada antrian persetujuan</td>
                </tr>
                <tr th:each="wo : ${workOrders.content}">
                    <td>
                        <a th:href="@{/workorders/{id}(id=${wo.id})}" th:text="${wo.workOrderNumber}"></a>
                    </td>
                    <td th:text="${wo.vehicle.licensePlate}"></td>
                    <td th:text="${wo.client.name}"></td>
                    <td th:text="${wo.estimateSubmittedBy != null ? wo.estimateSubmittedBy.fullName : '-'}"></td>
                    <td class="text-end"
                        th:text="${wo.estimatedCost != null ? 'Rp ' + #numbers.formatDecimal(wo.estimatedCost, 0, 'POINT', 0, 'POINT') : '-'}"></td>
                    <td class="text-end">
                        <form th:action="@{/approvals/estimates/{id}/approve(id=${wo.id})}" method="post" class="d-inline">
                            <input type="hidden" name="notes" value=""/>
                            <button type="submit" class="btn btn-sm btn-success">Approve</button>
                        </form>
                        <form th:action="@{/approvals/estimates/{id}/reject(id=${wo.id})}" method="post" class="d-inline ms-1">
                            <div class="input-group input-group-sm" style="max-width: 200px; display: inline-flex;">
                                <input name="reason" class="form-control" placeholder="Reason" required/>
                                <button type="submit" class="btn btn-outline-danger">Reject</button>
                            </div>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <nav th:if="${workOrders.totalPages > 1}" class="card-footer">
            <ul class="pagination mb-0 justify-content-center">
                <li class="page-item" th:classappend="${workOrders.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/approvals/estimates(page=${workOrders.number - 1})}">Previous</a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, workOrders.totalPages - 1)}"
                    th:classappend="${i == workOrders.number} ? 'active'">
                    <a class="page-link"
                       th:href="@{/approvals/estimates(page=${i})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${workOrders.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/approvals/estimates(page=${workOrders.number + 1})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>
</section>
</body>
</html>
