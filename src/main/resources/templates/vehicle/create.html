<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Vehicle Form</title>
</head>
<body>
<section layout:fragment="content">
    <h2 class="mb-3">
        <span th:text="${vehicle.id == null} ? 'New Vehicle' : 'Edit Vehicle'"></span></h2>
    <form th:action="${vehicle.id == null} ? @{/vehicles} : @{/vehicles/{id}(id=${vehicle.id})}"
          th:object="${vehicle}" method="post" class="card card-body shadow-sm">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Client <span class="text-danger">*</span></label>
                <select th:field="*{client}" class="form-select" required>
                    <option value="">-- Select Client --</option>
                    <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">License Plate <span class="text-danger">*</span></label>
                <input th:field="*{licensePlate}" class="form-control" required/>
            </div>
            <div class="col-md-3">
                <label class="form-label">Year</label>
                <input type="number" th:field="*{year}" class="form-control"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Brand <span class="text-danger">*</span></label>
                <input th:field="*{brand}" class="form-control" required/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Model <span class="text-danger">*</span></label>
                <input th:field="*{model}" class="form-control" required/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Color</label>
                <input th:field="*{color}" class="form-control"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Fuel Type</label>
                <select th:field="*{fuelType}" class="form-select">
                    <option value="">-- Select --</option>
                    <option th:each="f : ${fuelTypes}" th:value="${f}" th:text="${f}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Transmission</label>
                <select th:field="*{transmissionType}" class="form-select">
                    <option value="">-- Select --</option>
                    <option th:each="t : ${transmissionTypes}" th:value="${t}" th:text="${t}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Odometer (km)</label>
                <input type="number" th:field="*{currentOdometer}" class="form-control"/>
            </div>
            <div class="col-md-6">
                <label class="form-label">VIN</label>
                <input th:field="*{vin}" class="form-control"/>
            </div>
            <div class="col-md-6">
                <label class="form-label">Engine Number</label>
                <input th:field="*{engineNumber}" class="form-control"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Purchase Date</label>
                <input type="date" th:field="*{purchaseDate}" class="form-control"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Registration Expiry</label>
                <input type="date" th:field="*{registrationExpiry}" class="form-control"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Insurance Expiry</label>
                <input type="date" th:field="*{insuranceExpiry}" class="form-control"/>
            </div>
            <div class="col-12">
                <label class="form-label">Notes</label>
                <textarea th:field="*{notes}" class="form-control" rows="2"></textarea>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary"><i class="fas fa-save me-1"></i> Save</button>
            <a th:href="@{/vehicles}" class="btn btn-light">Cancel</a>
        </div>
    </form>
</section>
</body>
</html>
