<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Vehicles</title>
</head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="fas fa-car text-primary"></i> Vehicles</h2>
        <a th:href="@{/vehicles/create}" class="btn btn-primary"><i class="fas fa-plus"></i> New Vehicle</a>
    </div>

    <form th:action="@{/vehicles}" method="get" class="card card-body mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-md-4">
                <label class="form-label">Client</label>
                <select name="clientId" class="form-select">
                    <option value="">All</option>
                    <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}"
                            th:selected="${c.id.toString() == param.clientId}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Search</label>
                <input type="text" name="search" class="form-control" th:value="${param.search}"
                       placeholder="License plate, brand, model"/>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" type="submit"><i class="fas fa-search"></i> Filter</button>
            </div>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>License Plate</th>
                    <th>Brand / Model</th>
                    <th>Year</th>
                    <th>Client</th>
                    <th>Fuel</th>
                    <th>Odometer</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${vehicles.empty}">
                    <td colspan="7" class="text-center text-muted py-4">No vehicles</td>
                </tr>
                <tr th:each="v : ${vehicles.content}">
                    <td><a th:href="@{/vehicles/{id}(id=${v.id})}" th:text="${v.licensePlate}"></a></td>
                    <td th:text="${v.brand + ' ' + v.model}"></td>
                    <td th:text="${v.year}"></td>
                    <td th:text="${v.client.name}"></td>
                    <td th:text="${v.fuelType}"></td>
                    <td th:text="${v.currentOdometer ?: 0} + ' km'"></td>
                    <td>
                        <a th:href="@{/vehicles/{id}/history(id=${v.id})}" class="btn btn-sm btn-outline-secondary"
                           title="History"><i class="fas fa-history"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
