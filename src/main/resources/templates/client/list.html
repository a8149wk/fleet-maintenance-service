<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Clients</title></head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="fas fa-building text-primary"></i> Clients</h2>
        <a th:href="@{/clients/create}" class="btn btn-primary"><i class="fas fa-plus"></i> New Client</a>
    </div>

    <form th:action="@{/clients}" method="get" class="card card-body mb-3">
        <div class="row g-2">
            <div class="col-md-10">
                <input type="text" name="search" class="form-control" th:value="${param.search}"
                       placeholder="Search by name or code"/>
            </div>
            <div class="col-md-2"><button class="btn btn-primary w-100">Filter</button></div>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Code</th><th>Name</th><th>Business</th>
                    <th>City</th><th>Contact</th><th>Payment Term</th><th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${clients.empty}">
                    <td colspan="7" class="text-center text-muted py-4">No clients</td>
                </tr>
                <tr th:each="c : ${clients.content}">
                    <td th:text="${c.code}"></td>
                    <td><a th:href="@{/clients/{id}(id=${c.id})}" th:text="${c.name}"></a></td>
                    <td th:text="${c.businessType}"></td>
                    <td th:text="${c.city}"></td>
                    <td th:text="${c.contactPerson + ' / ' + c.contactPhone}"></td>
                    <td th:text="${c.paymentTerm + ' days'}"></td>
                    <td>
                        <a th:href="@{/clients/{id}/edit(id=${c.id})}" class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-edit"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
