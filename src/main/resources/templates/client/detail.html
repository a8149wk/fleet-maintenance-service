<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title th:text="${client.name}">Client</title></head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><span th:text="${client.name}"></span></h2>
        <div>
            <a th:href="@{/clients/{id}/edit(id=${client.id})}" class="btn btn-outline-primary">
                <i class="fas fa-edit"></i> Edit
            </a>
            <a th:href="@{/clients}" class="btn btn-light"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">Code</dt><dd class="col-sm-9" th:text="${client.code}"></dd>
                <dt class="col-sm-3">Business Type</dt><dd class="col-sm-9" th:text="${client.businessType}"></dd>
                <dt class="col-sm-3">NPWP</dt><dd class="col-sm-9" th:text="${client.npwp}"></dd>
                <dt class="col-sm-3">Address</dt>
                <dd class="col-sm-9" th:text="${client.address + ', ' + client.city + ', ' + client.province}"></dd>
                <dt class="col-sm-3">Contact</dt>
                <dd class="col-sm-9"
                    th:text="${client.contactPerson + ' - ' + client.contactPhone + ' (' + client.email + ')'}"></dd>
                <dt class="col-sm-3">Payment Term</dt>
                <dd class="col-sm-9" th:text="${client.paymentTerm + ' days'}"></dd>
                <dt class="col-sm-3">Credit Limit</dt>
                <dd class="col-sm-9"
                    th:text="${client.creditLimit != null ? 'Rp ' + #numbers.formatDecimal(client.creditLimit, 0, 'POINT', 0, 'POINT') : '-'}"></dd>
            </dl>
        </div>
    </div>
</section>
</body>
</html>
