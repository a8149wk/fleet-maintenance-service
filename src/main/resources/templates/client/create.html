<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Client Form</title></head>
<body>
<section layout:fragment="content">
    <h2 class="mb-3">
        <span th:text="${client.id == null} ? 'New Client' : 'Edit Client'"></span></h2>
    <form th:action="${client.id == null} ? @{/clients} : @{/clients/{id}(id=${client.id})}"
          th:object="${client}" method="post" class="card card-body shadow-sm">
        <div class="row g-3">
            <div class="col-md-3"><label class="form-label">Code</label>
                <input th:field="*{code}" class="form-control"/></div>
            <div class="col-md-6"><label class="form-label">Name *</label>
                <input th:field="*{name}" class="form-control" required/></div>
            <div class="col-md-3"><label class="form-label">Business Type</label>
                <input th:field="*{businessType}" class="form-control"/></div>
            <div class="col-md-4"><label class="form-label">NPWP</label>
                <input th:field="*{npwp}" class="form-control"/></div>
            <div class="col-md-4"><label class="form-label">Phone</label>
                <input th:field="*{phone}" class="form-control"/></div>
            <div class="col-md-4"><label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control"/></div>
            <div class="col-12"><label class="form-label">Address</label>
                <textarea th:field="*{address}" class="form-control" rows="2"></textarea></div>
            <div class="col-md-4"><label class="form-label">City</label>
                <input th:field="*{city}" class="form-control"/></div>
            <div class="col-md-4"><label class="form-label">Province</label>
                <input th:field="*{province}" class="form-control"/></div>
            <div class="col-md-4"><label class="form-label">Postal Code</label>
                <input th:field="*{postalCode}" class="form-control"/></div>
            <div class="col-md-4"><label class="form-label">Contact Person</label>
                <input th:field="*{contactPerson}" class="form-control"/></div>
            <div class="col-md-4"><label class="form-label">Contact Phone</label>
                <input th:field="*{contactPhone}" class="form-control"/></div>
            <div class="col-md-2"><label class="form-label">Payment Term (days)</label>
                <input type="number" th:field="*{paymentTerm}" class="form-control" value="30"/></div>
            <div class="col-md-2"><label class="form-label">Credit Limit</label>
                <input type="number" step="0.01" th:field="*{creditLimit}" class="form-control"/></div>
            <div class="col-12"><label class="form-label">Notes</label>
                <textarea th:field="*{notes}" class="form-control" rows="2"></textarea></div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary"><i class="fas fa-save me-1"></i> Save</button>
            <a th:href="@{/clients}" class="btn btn-light">Cancel</a>
        </div>
    </form>
</section>
</body>
</html>
