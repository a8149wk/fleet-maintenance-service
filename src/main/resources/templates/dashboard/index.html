<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Dashboard</title>
</head>
<body>
<section layout:fragment="content">
    <h2 class="mb-4"><i class="fas fa-home text-primary"></i> Dashboard</h2>

    <div class="row g-3">
        <div class="col-sm-6 col-lg-3">
            <div class="card border-start border-primary border-4 shadow-sm">
                <div class="card-body">
                    <div class="text-muted small text-uppercase">Total Clients</div>
                    <div class="h3 mb-0" th:text="${stats.totalClients}">0</div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card border-start border-success border-4 shadow-sm">
                <div class="card-body">
                    <div class="text-muted small text-uppercase">Total Vehicles</div>
                    <div class="h3 mb-0" th:text="${stats.totalVehicles}">0</div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card border-start border-warning border-4 shadow-sm">
                <div class="card-body">
                    <div class="text-muted small text-uppercase">Active Work Orders</div>
                    <div class="h3 mb-0" th:text="${stats.activeWorkOrders}">0</div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card border-start border-danger border-4 shadow-sm">
                <div class="card-body">
                    <div class="text-muted small text-uppercase">Pending Invoices</div>
                    <div class="h3 mb-0" th:text="${stats.pendingInvoices}">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3 mt-3">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="fas fa-tasks me-2 text-primary"></i>Recent Work Orders</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-sm mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>WO#</th>
                                <th>Vehicle</th>
                                <th>Client</th>
                                <th>Status</th>
                                <th>Requested</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(recentWorkOrders)}">
                                <td colspan="5" class="text-center text-muted">No work orders yet</td>
                            </tr>
                            <tr th:each="wo : ${recentWorkOrders}">
                                <td><a th:href="@{/workorders/{id}(id=${wo.id})}" th:text="${wo.workOrderNumber}"></a></td>
                                <td th:text="${wo.vehicle.licensePlate}"></td>
                                <td th:text="${wo.client.name}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${wo.status.name() == 'COMPLETED' ? 'bg-success' :
                                                              wo.status.name() == 'IN_PROGRESS' ? 'bg-info' :
                                                              wo.status.name() == 'APPROVED' ? 'bg-primary' :
                                                              wo.status.name() == 'REJECTED' ? 'bg-danger' :
                                                              wo.status.name() == 'CANCELLED' ? 'bg-secondary' :
                                                              wo.status.name() == 'BILLED' ? 'bg-dark' : 'bg-warning'}"
                                          th:text="${wo.status}"></span>
                                </td>
                                <td th:text="${#temporals.format(wo.requestedDate, 'dd MMM yyyy HH:mm')}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="fas fa-exclamation-triangle me-2 text-warning"></i>Low Stock Alerts</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-sm mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>Part</th>
                                <th>Location</th>
                                <th class="text-end">Qty</th>
                                <th class="text-end">Reorder</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(lowStockAlerts)}">
                                <td colspan="4" class="text-center text-muted">All stock levels OK</td>
                            </tr>
                            <tr th:each="a : ${lowStockAlerts}">
                                <td th:text="${a.partName}"></td>
                                <td th:text="${a.locationName}"></td>
                                <td class="text-end" th:text="${a.currentQuantity}"></td>
                                <td class="text-end" th:text="${a.reorderPoint}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
