<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Users</title></head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1"><i class="fas fa-users text-primary me-2"></i>Users</h2>
            <div class="text-muted text-small">Manage application accounts and their assigned roles.</div>
        </div>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i>New User
        </a>
    </div>

    <form th:action="@{/admin/users}" method="get" class="card card-body mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-md-10">
                <label class="form-label">Search</label>
                <input type="text" name="q" class="form-control" th:value="${keyword}"
                       placeholder="Username, email, or full name"/>
            </div>
            <div class="col-md-2"><button class="btn btn-primary w-100">Search</button></div>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Username</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Roles</th>
                    <th>Status</th>
                    <th>Last Login</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${users.empty}">
                    <td colspan="7" class="text-center text-muted py-4">No users found.</td>
                </tr>
                <tr th:each="u : ${users.content}">
                    <td>
                        <a th:href="@{|/admin/users/${u.id}/edit|}" th:text="${u.username}"></a>
                    </td>
                    <td th:text="${u.fullName}"></td>
                    <td th:text="${u.email}"></td>
                    <td>
                        <span th:each="r : ${u.roles}"
                              class="badge bg-primary me-1" th:text="${r.name}"></span>
                    </td>
                    <td>
                        <span th:if="${u.isActive}" class="badge bg-success">Active</span>
                        <span th:unless="${u.isActive}" class="badge bg-secondary">Disabled</span>
                        <span th:if="${u.isLocked}" class="badge bg-danger ms-1">Locked</span>
                    </td>
                    <td th:text="${u.lastLoginAt != null ? #temporals.format(u.lastLoginAt, 'yyyy-MM-dd HH:mm') : '—'}"></td>
                    <td class="text-end">
                        <form th:action="@{|/admin/users/${u.id}/toggle|}" method="post" class="d-inline">
                            <button class="btn btn-sm btn-outline-primary"
                                    th:title="${u.isActive ? 'Disable' : 'Enable'}">
                                <i th:class="${u.isActive ? 'fas fa-ban' : 'fas fa-check'}"></i>
                            </button>
                        </form>
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{|/admin/users/${u.id}/edit|}" title="Edit">
                            <i class="fas fa-pen"></i>
                        </a>
                        <form th:action="@{|/admin/users/${u.id}/delete|}" method="post" class="d-inline"
                              onsubmit="return confirm('Delete this user?');">
                            <button class="btn btn-sm btn-outline-danger" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${users.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center mb-0">
            <li th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                class="page-item" th:classappend="${i == users.number ? 'active' : ''}">
                <a class="page-link" th:href="@{/admin/users(q=${keyword}, page=${i})}" th:text="${i + 1}"></a>
            </li>
        </ul>
    </nav>
</section>
</body>
</html>
