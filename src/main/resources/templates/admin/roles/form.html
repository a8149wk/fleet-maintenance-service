<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>New Role</title></head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <a th:href="@{/admin/roles}" class="text-muted text-small text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i>Back to roles
            </a>
            <h2 class="mt-1 mb-1"><i class="fas fa-user-shield text-primary me-2"></i>New Role</h2>
        </div>
    </div>

    <form th:action="@{/admin/roles}" method="post" class="card card-body" style="max-width: 640px;">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" name="name" required maxlength="50"
                   placeholder="e.g. DISPATCHER"/>
            <div class="text-tiny text-muted">Use UPPERCASE_WITH_UNDERSCORES (matches Spring Security role convention).</div>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="3"></textarea>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary"><i class="fas fa-save me-1"></i>Create</button>
            <a th:href="@{/admin/roles}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
</body>
</html>
