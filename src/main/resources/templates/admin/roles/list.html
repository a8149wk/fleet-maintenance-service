<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Roles &amp; Menus</title></head>
<body>
<section layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1">Roles &amp; Menu Mapping</h2>
            <div class="text-muted text-small">
                Roles control what each user can see in the sidebar and access via URLs.
            </div>
        </div>
        <a th:href="@{/admin/roles/new}" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i>New Role
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${roles.empty}">
                    <td colspan="3" class="text-center text-muted py-4">No roles found.</td>
                </tr>
                <tr th:each="r : ${roles}">
                    <td>
                        <a th:href="@{|/admin/roles/${r.id}/edit|}" th:text="${r.name}"></a>
                    </td>
                    <td th:text="${r.description}"></td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{|/admin/roles/${r.id}/edit|}" title="Edit">
                            <i class="fas fa-pen"></i>
                        </a>
                        <form th:action="@{|/admin/roles/${r.id}/delete|}" method="post" class="d-inline"
                              onsubmit="return confirm('Delete this role? Users mapped to it will lose access.');">
                            <button class="btn btn-sm btn-outline-danger" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
