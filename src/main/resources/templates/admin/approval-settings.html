<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Approval setup</title>
</head>
<body>
<section layout:fragment="content">
    <h2 class="mb-3">Pengaturan persetujuan estimasi eksternal</h2>
    <p class="text-muted">
        Tentukan role Spring Security (misalnya <code>ROLE_ADMIN</code>) yang boleh menyetujui atau menolak estimasi
        dari bengkel rekanan dan penyedia spare part. Pisahkan dengan koma.
    </p>

    <form th:action="@{/admin/approval-settings}" method="post" class="card card-body shadow-sm" style="max-width: 640px;">
        <div class="mb-3">
            <label class="form-label" for="approverRolesCsv">Role yang dapat approve</label>
            <textarea id="approverRolesCsv" name="approverRolesCsv" class="form-control font-monospace" rows="3"
                      th:inline="text">[[${approverRolesCsv}]]</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Simpan</button>
    </form>
</section>
</body>
</html>
