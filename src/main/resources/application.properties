# =====================================================
# Fleet Maintenance System - Application Properties
# Default profile uses PostgreSQL. Use --spring.profiles.active=dev
# to run with embedded H2 for quick local testing.
#
# Deployment override files (see deploy/README.md):
#   ./config/database.properties  - database connection
#   ./config/logging.properties   - log file path & rotation
# Both files are OPTIONAL: when missing, the defaults below are used.
# When present, their values override the defaults.
# =====================================================
spring.config.import=optional:file:./config/database.properties,optional:file:./config/logging.properties

spring.application.name=Fleet Maintenance System
server.port=${SERVER_PORT:8080}

# Active profile (override with -Dspring.profiles.active=dev for H2)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# ----- Database (PostgreSQL) -----
spring.datasource.url=jdbc:postgresql://localhost:5432/fleet_maintenance_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----- JPA -----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Open Session In View: ENABLED.
# This is Spring Boot's default and pragmatic for a Thymeleaf-driven
# CRUD app whose templates naturally traverse @ManyToOne / @OneToMany
# relationships (e.g. WorkOrder -> Vehicle -> Client). Eager-fetch
# queries in repositories are still used where it matters for perf.
spring.jpa.open-in-view=true

# ----- Flyway -----
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# ----- Thymeleaf -----
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ----- File Upload -----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# ----- Logging -----
logging.level.root=INFO
logging.level.com.fms=DEBUG
logging.level.org.springframework.security=INFO

# ----- Email (optional) -----
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ----- JWT -----
jwt.secret=${JWT_SECRET:MySecretKeyForJWTTokenGenerationFleetMaintenanceSystem2024ChangeMe!!}
jwt.expiration=86400000

# ----- Pagination -----
app.page-size=20

# ----- Date Format -----
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss
spring.mvc.format.time=HH:mm:ss

# ----- Jackson -----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Jakarta

# ----- Error pages -----
server.error.whitelabel.enabled=false
