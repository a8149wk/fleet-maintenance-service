# =====================================================
# Logging configuration (external, lives next to the JAR
# under ./config/logging.properties). Controls log
# destination, rotation, and verbosity.
# =====================================================

# ---- Log file destination ----
# Path is resolved RELATIVE TO THE PROCESS WORKING DIRECTORY
# (i.e. the directory you launch the JAR from). Use an absolute
# path like /var/log/fleet-maintenance/app.log on Linux or
# C:/logs/fleet-maintenance/app.log on Windows if you want the
# logs to live somewhere fixed.
logging.file.name=./logs/fleet-maintenance.log

# ---- Rotation ----
# Rolled file naming pattern (Logback). Use the same directory
# as logging.file.name above.
logging.logback.rollingpolicy.file-name-pattern=./logs/fleet-maintenance.%d{yyyy-MM-dd}.%i.log.gz
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

# ---- Patterns ----
# Console format kept short; file format keeps full thread + logger.
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{40} - %msg%n

# ---- Log levels ----
logging.level.root=INFO
logging.level.com.fms=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO
