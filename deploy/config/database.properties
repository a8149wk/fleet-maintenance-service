# =====================================================
# Database configuration (external, lives next to the JAR
# under ./config/database.properties). Anything set here
# overrides the defaults bundled inside the JAR.
# =====================================================

# ---- Server port (uncomment to change from default 8080) ----
# server.port=8080

# ---- Database connection ----
spring.datasource.url=jdbc:postgresql://localhost:5432/fleet_maintenance_db
spring.datasource.username=postgres
spring.datasource.password=changeme
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ---- JPA / Hibernate ----
# Use 'validate' in production so the schema is verified at startup
# but never auto-modified. 'update' is acceptable for staging only.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- Flyway migrations ----
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# ---- JWT signing key (CHANGE THIS in production!) ----
# Must be at least 32 characters. Used to sign mobile API tokens.
jwt.secret=ReplaceThisWithASecureRandomSecretAtLeast32CharactersLong!!
jwt.expiration=86400000

