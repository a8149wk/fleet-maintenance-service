# =====================================================
# Sample Nginx vhost for the Fleet Maintenance Service.
#
# Install on Linux (RHEL/CentOS/OpenCloudOS):
#   dnf install -y nginx
#   cp fleetmaintsvc.conf /etc/nginx/conf.d/
#   # edit server_name to your real domain
#   nginx -t && systemctl reload nginx
#
# Then issue/renew a TLS cert with certbot:
#   dnf install -y certbot python3-certbot-nginx
#   certbot --nginx \
#       -d fleetmaintsvc.my.id -d www.fleetmaintsvc.my.id \
#       --agree-tos --redirect -m you@example.com --non-interactive
#
# certbot will rewrite this file to add the `listen 443 ssl` block and
# an http -> https redirect. The Spring Boot application reads the
# X-Forwarded-* headers (server.forward-headers-strategy=framework is
# the default in application.properties), so HTTPS redirects, CSRF,
# and cookies all use the public domain and scheme automatically.
# =====================================================

server {
    listen 80;
    listen [::]:80;
    server_name fleetmaintsvc.my.id www.fleetmaintsvc.my.id;

    # Match Spring multipart limit (10 MB) with a small headroom.
    client_max_body_size 20m;

    access_log /var/log/nginx/fleetmaintsvc.access.log;
    error_log  /var/log/nginx/fleetmaintsvc.error.log;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Identity headers consumed by Spring's ForwardedHeaderFilter.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        # JVM startup, PDF generation, and Excel export can be slow;
        # keep these timeouts generous.
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Pass through WebSocket-style upgrade headers (harmless when
        # not used; useful if you later add server-sent events / WS).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
